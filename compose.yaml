services:
    laravel.test:
        build:
            context: './docker/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        expose:
            - "80"
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: 'off'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        entrypoint: bash -c "phpdismod xdebug && phpdismod swoole && phpdismod pcov && start-container"
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
    pgsql:
        image: 'postgres:${POSTGRES_VERSION:-18}-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './docker/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    reverb:
        build:
            context: './docker/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${REVERB_PORT:-8080}:8080'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: 'off'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            SUPERVISOR_PHP_COMMAND: 'php artisan reverb:start --host=0.0.0.0 --port=8080 --hostname=localhost'
        entrypoint: bash -c "phpdismod xdebug && phpdismod swoole && phpdismod pcov && start-container"
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
    caddy:
        image: caddy:2-alpine
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - ./certs:/app/certs
            - caddy_data:/data
            - caddy_config:/config
        networks:
            - sail
        depends_on:
            - laravel.test
            - n8n
    n8n:
        image: n8nio/n8n:latest
        restart: unless-stopped
        expose:
            - "5678"
        environment:
            - N8N_HOST=${N8N_HOST}
            - N8N_PORT=${N8N_PORT}
            - N8N_PROTOCOL=${N8N_PROTOCOL}
            - WEBHOOK_URL=${N8N_WEBHOOK_URL}

            - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
            - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
            - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

            - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
            - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}

            - DB_TYPE=${N8N_DB_TYPE}
            - DB_POSTGRESDB_HOST=${N8N_DB_HOST}
            - DB_POSTGRESDB_PORT=${N8N_DB_PORT}
            - DB_POSTGRESDB_DATABASE=${N8N_DB_DATABASE}
            - DB_POSTGRESDB_USER=${N8N_DB_USER}
            - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}

            # optional hardening/noise reduction
            - N8N_DIAGNOSTICS_ENABLED=${N8N_DIAGNOSTICS_ENABLED}
            - N8N_VERSION_NOTIFICATIONS_ENABLED=${N8N_VERSION_NOTIFICATIONS_ENABLED}
            # Internal Laravel base URL for n8n HTTP nodes
            - LARAVEL_BASE_URL=${LARAVEL_BASE_URL_INTERNAL:-http://laravel.test}
        volumes:
            - n8n_data:/home/node/.n8n
        depends_on:
            - pgsql
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    n8n_data:
        driver: local
    caddy_data:
        driver: local
    caddy_config:
        driver: local
